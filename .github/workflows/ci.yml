# =============================================================================
# HOW THIS PIPELINE WORKS (read this first)
#
#   Every push / PR  →  [ci]  lint + tests + build. Nothing ships if this fails.
#   Push to main only →  [deploy-supabase]  DB migrations + edge function
#                     →  [deploy-frontend]  Vercel production deploy
#
#   Backend deploys before frontend so the schema the new UI expects exists.
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — your Supabase database password
#   SUPABASE_PROJECT_REF   — wgqvygxbbkqgjxqdefgp (Project Settings → General)
#   VERCEL_TOKEN           — vercel.com/account/settings/tokens
#   VERCEL_ORG_ID          — from .vercel/project.json ("orgId")
#   VERCEL_PROJECT_ID      — from .vercel/project.json ("projectId")
#
# The live site: https://outlierlabs.tech (also https://outlier-fawn.vercel.app)
# =============================================================================
name: CI/CD — Test, Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# One pipeline per branch at a time. In-progress PR runs are cancelled when a
# newer push supersedes them; main deploys are never cancelled mid-flight
# (a half-finished deploy could leave backend and frontend out of sync).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ---------------------------------------------------------------------------
  # Gate: runs on every push AND every pull request. Nothing deploys unless
  # this job is green.
  # ---------------------------------------------------------------------------
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (clean)
        run: npm ci

      - name: Lint (typecheck + eslint)
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Verify production build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder-ci.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-ci-key

  # ---------------------------------------------------------------------------
  # Deploy backend first: push DB migrations + deploy the edge function.
  # Runs ONLY on push to main, ONLY after `ci` passes.
  # ---------------------------------------------------------------------------
  deploy-supabase:
    name: Deploy Supabase (DB + functions)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pinned version: "latest" makes the action look up the newest release via
      # the GitHub API unauthenticated, which rate-limits on shared runner IPs.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Link to Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      # ponytail: one-time-safe reconcile. These migrations were hand-applied to
      # the remote DB during dev before CI existed, so the history table doesn't
      # record them and `db push` would try to replay them (CREATE POLICY errors
      # on already-existing objects). Marking them applied is idempotent — a
      # no-op once synced — so this is safe to keep as the pre-CI baseline.
      - name: Reconcile migration history (pre-CI baseline)
        run: >
          supabase migration repair --status applied
          20260601000000 20260610132227 20260610132259 20260611000000
          20260612000000 20260613000000 20260613100000

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy gemini-proxy

  # ---------------------------------------------------------------------------
  # Deploy frontend to Vercel, after the backend is up so the schema the new
  # UI expects already exists. VITE_* env vars come from the Vercel project
  # settings (Production), pulled by `vercel pull`.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: deploy-supabase
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build with Vercel
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
