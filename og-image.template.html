<!doctype html>
<!--
  Source for public/og-image.png (1200×630). Not shipped in the build.
  Regenerate after editing:
    msedge --headless=new --disable-gpu --window-size=1200,630 \
      --force-device-scale-factor=1 --virtual-time-budget=6000 \
      --screenshot="public/og-image.png" "file:///ABS/PATH/og-image.template.html"
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        background: #fff6e3;
        color: #1a1a1a;
        overflow: hidden;
      }
      .frame {
        position: absolute;
        inset: 28px;
        border: 8px solid #1a1a1a;
        background: #fff6e3;
        display: flex;
        align-items: stretch;
      }
      .left {
        flex: 1;
        padding: 56px 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .kicker {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #a8275a;
        margin-bottom: 22px;
      }
      .wordmark {
        font-size: 168px;
        font-weight: 900;
        line-height: 0.82;
        letter-spacing: -0.05em;
        text-transform: uppercase;
      }
      .tagline {
        font-size: 46px;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-top: 28px;
      }
      .tagline .hl {
        background: #ffde59;
        box-shadow: 0 6px 0 #1a1a1a;
        padding: 0 8px;
      }
      .sub {
        font-size: 24px;
        font-weight: 500;
        line-height: 1.35;
        color: #1a1a1a;
        opacity: 0.8;
        margin-top: 34px;
        max-width: 620px;
      }
      .right {
        width: 360px;
        background: #a8275a;
        border-left: 8px solid #1a1a1a;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .right::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: radial-gradient(#ffffff 2px, transparent 2px);
        background-size: 34px 34px;
        opacity: 0.14;
      }
      .zee {
        width: 260px;
        height: auto;
        position: relative;
        z-index: 1;
        filter: drop-shadow(10px 10px 0 rgba(26, 26, 26, 0.35));
      }
      .badge {
        position: absolute;
        left: 60px;
        bottom: 48px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="left">
        <div class="kicker">For students who refuse the average</div>
        <div class="wordmark">Outlier</div>
        <div class="tagline">See your <span class="hl">real</span> class standing</div>
        <div class="sub">
          Turn raw university marks into your exact standing — class average,
          Z-score, gap to the topper — and a predicted GPA.
        </div>
      </div>
      <div class="right">
        <svg class="zee" viewBox="0 0 240 230" xmlns="http://www.w3.org/2000/svg" role="img">
          <rect x="58" y="58" width="140" height="140" fill="#1A1A1A"/>
          <rect x="80" y="190" width="14" height="24" fill="#1A1A1A"/>
          <rect x="146" y="190" width="14" height="24" fill="#1A1A1A"/>
          <rect x="66" y="212" width="28" height="12" fill="#1A1A1A"/>
          <rect x="146" y="212" width="28" height="12" fill="#1A1A1A"/>
          <rect x="50" y="50" width="140" height="140" fill="#ffde59" stroke="#1A1A1A" stroke-width="6"/>
          <path d="M52 140 L30 166" stroke="#1A1A1A" stroke-width="12" stroke-linecap="square"/>
          <path d="M188 140 L210 166" stroke="#1A1A1A" stroke-width="12" stroke-linecap="square"/>
          <path d="M95 91 L99 102 L110 106 L99 110 L95 121 L91 110 L80 106 L91 102 Z" fill="#1A1A1A"/>
          <path d="M145 91 L149 102 L160 106 L149 110 L145 121 L141 110 L130 106 L141 102 Z" fill="#1A1A1A"/>
          <path d="M80 80 Q95 68 110 80 M130 80 Q145 68 160 80" stroke="#1A1A1A" stroke-width="7" fill="none" stroke-linecap="square"/>
          <path d="M100 138 H140 Q120 166 100 138 Z" fill="#1A1A1A"/>
          <path d="M176 44 L196 22" stroke="#1A1A1A" stroke-width="3" stroke-dasharray="6 5"/>
          <circle cx="200" cy="17" r="8" fill="#a8275a" stroke="#1A1A1A" stroke-width="4"/>
        </svg>
      </div>
    </div>
  </body>
</html>
